<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password - Communication LTD</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/registration.css" />
  </head>

  <body>
    <form class="form login">
      <h1>Set New Password</h1>
      <p>Enter a new password after verification</p>

      <input id="change-email-input" type="email" placeholder="Email" required readonly />
      <input
        id="change-new-password-input"
        type="password"
        placeholder="New password"
        required
      />

      <button id="change-password-button" type="submit">Change Password</button>
      <a class="change-password-link" href="./login.html">Back to login</a>
      <p id="change-password-message"></p>
    </form>

    <script type="module" src="/scripts/change-password-after-verification.js"></script>
  </body>
</html>
