<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/registration.css" />
  </head>

  <body>
    <form class="form forgot-password">
      <h1>Forgot Password</h1>

      <input id="email-forgot-password" type="text" placeholder="Email" required />
      <input id="verification-code"type="text" placeholder="Enter verification code" style="display:none;"/>
      
      <button id="send-email-button" type="submit">Send Code</button>
      <a class="change-password-link" href="./login.html">Back to login</a>
      <p id="forgot-password-message"></p>
    </form>

    <script type="module" src="../scripts/forgot-password.js"></script>
  </body>
</html>
