<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/registration.css" />
  </head>

  <body>
    <button onclick="window.location.href='./main.html'" style="position:fixed;top:20px;right:24px;z-index:100">Return to Homepage</button>
    <form class="form" id="registration-form">
      <h1>Create Account</h1>
      <p>Join Communication LTD today</p>

      <input id="username-input" type="text" placeholder="Username" required />
      <input id="email-input" type="email" placeholder="Email" required />
      <input id="password-input" type="password" placeholder="Password" required />

      <span id="registration-message" style="color:var(--color-primary);font-size:14px"></span>
      <button type="submit">Register</button>
    </form>

    <script type="module" src="../scripts/requests.js"></script>
    <script type="module" src="../scripts/registration.js"></script>
  </body>
</html>
