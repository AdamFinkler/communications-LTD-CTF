<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Communication LTD</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/registration.css" />
  </head>

  <body>
    <form id="registration-form" class="form">
      <h1>Create Account</h1>
      <p>Join Communication LTD today</p>

      <input id="username-input" type="text" placeholder="Username" required />
      <input id="email-input" type="email" placeholder="Email" required />
      <input id="password-input" type="password" placeholder="Password" required />

      <button type="submit">Register</button>
      <a class="change-password-link" href="./login.html">Already have an account? Log in</a>
      <a class="change-password-link" href="./main.html">Back to home</a>
      <p id="registration-message"></p>
    </form>

    <script type="module" src="/scripts/registration.js"></script>
  </body>
</html>
